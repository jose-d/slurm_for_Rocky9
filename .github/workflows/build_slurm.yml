name: Build Slurm packages
run-name: ${{ github.actor }} is building supported pmix/slurm tuples 🚀

on: workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prolog:
    name: Generate manifest-driven matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      reltag: ${{ steps.generate.outputs.reltag }}
      matrix: ${{ steps.generate.outputs.matrix }}
      pmix_matrix: ${{ steps.generate.outputs.pmix_matrix }}
      munge_matrix: ${{ steps.generate.outputs.munge_matrix }}
      release_body: ${{ steps.generate.outputs.release_body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate matrix and release body from manifest
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          RELTAG="$(date +%Y%m%d%H%M%S)"
          echo "reltag=${RELTAG}" >> "$GITHUB_OUTPUT"
          python <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("build-manifest.json").read_text())
          builds = manifest["builds"]
          suffix_counts = {}
          for build in builds:
              for item in build["pmix_builds"]:
                  suffix = (
                      f"{build['distro']}-pmix-"
                      f"{item.get('package_name', 'pmix')}-{item['version']}"
                  )
                  suffix_counts[suffix] = suffix_counts.get(suffix, 0) + 1

          pmix_matrix_entries = []
          for build in builds:
              pmix_builds = build["pmix_builds"]
              build["pmix_paths"] = ":".join(item["install_path"] for item in pmix_builds)
              build["pmix_release_label"] = " + ".join(
                  f"PMIx {item['version']}" for item in pmix_builds
              )
              for item in pmix_builds:
                  suffix = (
                      f"{build['distro']}-pmix-"
                      f"{item.get('package_name', 'pmix')}-{item['version']}"
                  )
                  if suffix_counts[suffix] > 1:
                      suffix = f"{suffix}-slurm-{build['slurm_version']}"
                  pmix_matrix_entries.append(
                      {
                          "distro": build["distro"],
                          "pmix_version": item["version"],
                          "pmix_srcrpm_release": item.get("pmix_srcrpm_release", "1"),
                          "pmix_package_name": item.get("package_name", "pmix"),
                          "pmix_install_path": item["install_path"],
                          "pmix_builder_image": build["pmix_builder_image"],
                          "script_dir": build["script_dir"],
                          "pmix_artifact_suffix": suffix,
                      }
                  )
          matrix = json.dumps({"include": builds}, separators=(",", ":"))
          pmix_matrix = json.dumps(
              {"include": pmix_matrix_entries},
              separators=(",", ":"),
          )

          munge_matrix_entries = []
          for build in builds:
              munge_version = build.get("munge_version")
              if munge_version:
                  munge_matrix_entries.append(
                      {
                          "distro": build["distro"],
                          "munge_version": munge_version,
                          "munge_builder_image": build["slurm_builder_image"],
                          "script_dir": build["script_dir"],
                          "munge_artifact_suffix": f"{build['distro']}-munge-{munge_version}",
                      }
                  )
          munge_matrix = json.dumps(
              {"include": munge_matrix_entries},
              separators=(",", ":"),
          )

          lines = ["RPMs containing builds of:"]
          for build in builds:
              detail = (
                  f"* {build['distro']}: "
                  f"[Slurm {build['slurm_version']}](https://slurm.schedmd.com/) + "
                  f"{build['pmix_release_label']}"
              )
              nvml_version = build.get("nvml_version")
              if nvml_version:
                  detail += f", NVML/CUDA {nvml_version}"
              lines.append(detail)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
              output.write(f"pmix_matrix={pmix_matrix}\n")
              output.write(f"munge_matrix={munge_matrix}\n")
              output.write("release_body<<EOF\n")
              output.write("\n".join(lines) + "\n")
              output.write("EOF\n")
          PY

  build_pmix:
    name: Build PMIx ${{ matrix.distro }} ${{ matrix.pmix_version }}
    runs-on: ubuntu-latest
    needs: prolog
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prolog.outputs.pmix_matrix) }}
    env:
      GHCR_U: ${{ vars.GHCR_U || github.repository_owner }}
      GHCR_S: ${{ secrets.GHCR_S || secrets.GITHUB_TOKEN }}
      RELTAG: ${{ needs.prolog.outputs.reltag }}
      DISTRO: ${{ matrix.distro }}
      PMIX_VERSION: ${{ matrix.pmix_version }}
      PMIX_SRCRPM_RELEASE: ${{ matrix.pmix_srcrpm_release }}
      PMIX_PACKAGE_NAME: ${{ matrix.pmix_package_name }}
      PMIX_INSTALL_PATH: ${{ matrix.pmix_install_path }}
      PMIXIMAGE_URL: ${{ matrix.pmix_builder_image }}
      BUILD_SCRIPT_DIR: ${{ matrix.script_dir }}
      PMIX_ARTIFACT_SUFFIX: ${{ matrix.pmix_artifact_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache PMIx src.rpm
        uses: actions/cache@v5
        with:
          path: pmix-${{ env.PMIX_VERSION }}-${{ env.PMIX_SRCRPM_RELEASE }}.src.rpm
          key: ${{ runner.os }}-${{ matrix.distro }}-pmix-${{ env.PMIX_VERSION }}-${{ env.PMIX_SRCRPM_RELEASE }}-srcrpm
          restore-keys: |
            ${{ runner.os }}-${{ matrix.distro }}-pmix-${{ env.PMIX_VERSION }}-

      - name: Download PMIx src.rpm
        shell: bash
        run: |
          set -euo pipefail
          SRCRPM="pmix-${PMIX_VERSION}-${PMIX_SRCRPM_RELEASE}.src.rpm"
          if [ ! -f "${SRCRPM}" ]; then
            wget --quiet "https://github.com/openpmix/openpmix/releases/download/v${PMIX_VERSION}/${SRCRPM}"
          fi

      - name: Login to ghcr registry with docker and build PMIx
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_S" | docker login ghcr.io -u "$GHCR_U" --password-stdin
          docker run \
                     --env PMIX_RELTAG="${RELTAG}" \
                     --env PMIX_VERSION="${PMIX_VERSION}" \
                     --env PMIX_SRCRPM_RELEASE="${PMIX_SRCRPM_RELEASE}" \
                     --env PMIX_PACKAGE_NAME="${PMIX_PACKAGE_NAME}" \
                     --env PMIX_OPT_PREFIX_BASE="$(dirname "${PMIX_INSTALL_PATH}")" \
                     --env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
                     -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
                     -w "${GITHUB_WORKSPACE}" \
                     "${PMIXIMAGE_URL}" \
                     /bin/bash "${BUILD_SCRIPT_DIR}/build_pmix.sh" 2>&1 | tee "pmix_build_${DISTRO}_${PMIX_VERSION}.log"

      - name: Upload PMIx build log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PMIX_ARTIFACT_SUFFIX }}-build.log
          if-no-files-found: error
          path: ${{ github.workspace }}/pmix_build_${{ matrix.distro }}_${{ matrix.pmix_version }}.log

      - name: Upload PMIx rpm list as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PMIX_ARTIFACT_SUFFIX }}-image_pmix_rpms.txt
          if-no-files-found: error
          path: ${{ github.workspace }}/image_pmix_rpms.txt

      - name: Upload PMIx rpms as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PMIX_ARTIFACT_SUFFIX }}-rpms
          if-no-files-found: error
          path: ${{ github.workspace }}/rpms/*.rpm

  build_munge:
    name: Build Munge ${{ matrix.distro }} ${{ matrix.munge_version }}
    runs-on: ubuntu-latest
    needs: prolog
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prolog.outputs.munge_matrix) }}
    env:
      GHCR_U: ${{ vars.GHCR_U || github.repository_owner }}
      GHCR_S: ${{ secrets.GHCR_S || secrets.GITHUB_TOKEN }}
      RELTAG: ${{ needs.prolog.outputs.reltag }}
      DISTRO: ${{ matrix.distro }}
      MUNGE_VERSION: ${{ matrix.munge_version }}
      MUNGE_BUILDER_IMAGE: ${{ matrix.munge_builder_image }}
      BUILD_SCRIPT_DIR: ${{ matrix.script_dir }}
      MUNGE_ARTIFACT_SUFFIX: ${{ matrix.munge_artifact_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Munge tarball
        uses: actions/cache@v5
        with:
          path: munge-${{ env.MUNGE_VERSION }}.tar.xz
          key: ${{ runner.os }}-${{ matrix.distro }}-munge-${{ env.MUNGE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.distro }}-munge-

      - name: Download Munge tarball
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="munge-${MUNGE_VERSION}.tar.xz"
          if [ ! -f "${TARBALL}" ]; then
            wget --quiet "https://github.com/dun/munge/releases/download/munge-${MUNGE_VERSION}/${TARBALL}"
          fi

      - name: Login to ghcr registry with docker and build Munge
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_S" | docker login ghcr.io -u "$GHCR_U" --password-stdin
          docker run \
                     --env MUNGE_RELTAG="${RELTAG}" \
                     --env MUNGE_VERSION="${MUNGE_VERSION}" \
                     --env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
                     -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
                     -w "${GITHUB_WORKSPACE}" \
                     "${MUNGE_BUILDER_IMAGE}" \
                     /bin/bash "${BUILD_SCRIPT_DIR}/build_munge.sh" 2>&1 | tee "munge_build_${DISTRO}.log"

      - name: Upload Munge build log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MUNGE_ARTIFACT_SUFFIX }}-build.log
          if-no-files-found: error
          path: ${{ github.workspace }}/munge_build_${{ matrix.distro }}.log

      - name: Upload Munge rpm list as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MUNGE_ARTIFACT_SUFFIX }}-image_munge_rpms.txt
          if-no-files-found: error
          path: ${{ github.workspace }}/image_munge_rpms.txt

      - name: Upload Munge rpms as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MUNGE_ARTIFACT_SUFFIX }}-rpms
          if-no-files-found: error
          path: ${{ github.workspace }}/rpms/*.rpm

  build_slurm:
    name: Build ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs:
      - prolog
      - build_pmix
      - build_munge
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prolog.outputs.matrix) }}
    env:
      GHCR_U: ${{ vars.GHCR_U || github.repository_owner }}
      GHCR_S: ${{ secrets.GHCR_S || secrets.GITHUB_TOKEN }}
      RELTAG: ${{ needs.prolog.outputs.reltag }}
      DISTRO: ${{ matrix.distro }}
      SLURM_VERSION: ${{ matrix.slurm_version }}
      SLURM_SPEC_PATH: ./slurm-${{ matrix.slurm_version }}/slurm.spec
      SLURM_PMIX_PATHS: ${{ matrix.pmix_paths }}
      SLURMIMAGE_URL: ${{ matrix.slurm_builder_image }}
      BUILD_SCRIPT_DIR: ${{ matrix.script_dir }}
      SLURM_NVML_PATH: ${{ matrix.slurm_nvml_path || '' }}
      SLURM_UCX_PATH: ${{ matrix.slurm_ucx_path || '' }}
      SLURM_WITH_UCX: ${{ matrix.slurm_with_ucx || false }}
      SLURM_WITH_RPATH: ${{ matrix.slurm_with_rpath || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download PMIx rpms for current distro
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ matrix.distro }}-pmix-*-rpms
          path: ${{ github.workspace }}/pmix_rpms
          merge-multiple: true

      - name: Flatten downloaded PMIx rpms
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/pmix_rpms"
          mapfile -t pmix_rpms < <(find "${GITHUB_WORKSPACE}/pmix_rpms" -type f -name '*.rpm')
          if [ "${#pmix_rpms[@]}" -eq 0 ]; then
            echo "No PMIx RPMs were downloaded" >&2
            exit 1
          fi
          for rpm in "${pmix_rpms[@]}"; do
            dest="${GITHUB_WORKSPACE}/pmix_rpms/$(basename "${rpm}")"
            if [ "${rpm}" != "${dest}" ]; then
              mv "${rpm}" "${dest}"
            fi
          done

      - name: Print downloaded PMIx rpms
        shell: bash
        run: |
          set -euo pipefail
          find "${GITHUB_WORKSPACE}/pmix_rpms" -maxdepth 1 -type f -name '*.rpm' -print | sort

      - name: Create PMIx RPM repository
        shell: bash
        run: |
          set -euo pipefail
          PMIX_RPMS_DIR="${GITHUB_WORKSPACE}/pmix_rpms"
          docker run --rm \
            -v "${PMIX_RPMS_DIR}:${PMIX_RPMS_DIR}" \
            rockylinux:9 \
            bash -c "dnf install -y createrepo_c && createrepo_c ${PMIX_RPMS_DIR}"

      - name: Download Munge rpms for current distro
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ matrix.distro }}-munge-*-rpms
          path: ${{ github.workspace }}/munge_rpms
          merge-multiple: true

      - name: Flatten downloaded Munge rpms
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/munge_rpms"
          mapfile -t munge_rpms < <(find "${GITHUB_WORKSPACE}/munge_rpms" -type f -name '*.rpm')
          if [ "${#munge_rpms[@]}" -eq 0 ]; then
            echo "No Munge RPMs were downloaded" >&2
            exit 1
          fi
          for rpm in "${munge_rpms[@]}"; do
            dest="${GITHUB_WORKSPACE}/munge_rpms/$(basename "${rpm}")"
            if [ "${rpm}" != "${dest}" ]; then
              mv "${rpm}" "${dest}"
            fi
          done

      - name: Print downloaded Munge rpms
        shell: bash
        run: |
          set -euo pipefail
          find "${GITHUB_WORKSPACE}/munge_rpms" -maxdepth 1 -type f -name '*.rpm' -print | sort

      - name: Create Munge RPM repository
        shell: bash
        run: |
          set -euo pipefail
          MUNGE_RPMS_DIR="${GITHUB_WORKSPACE}/munge_rpms"
          docker run --rm \
            -v "${MUNGE_RPMS_DIR}:${MUNGE_RPMS_DIR}" \
            rockylinux:9 \
            bash -c "dnf install -y createrepo_c && createrepo_c ${MUNGE_RPMS_DIR}"

      - name: Cache Slurm tarball
        uses: actions/cache@v5
        with:
          path: slurm-${{ env.SLURM_VERSION }}.tar.bz2
          key: ${{ runner.os }}-${{ matrix.distro }}-slurm-${{ env.SLURM_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.distro }}-slurm-

      - name: Download Slurm tarball, unpack, patch spec file
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "slurm-${SLURM_VERSION}.tar.bz2" ]; then
            curl -L -o "slurm-${SLURM_VERSION}.tar.bz2" "https://download.schedmd.com/slurm/slurm-${SLURM_VERSION}.tar.bz2"
          fi
          tar -xf "slurm-${SLURM_VERSION}.tar.bz2"
          sed -i "s/^%define rel.*$/%define rel     ${RELTAG}/g" "${SLURM_SPEC_PATH}"
          sed -i "s/^%global slurm_source_dir.*$/%global slurm_source_dir %{name}-%{version}/g" "${SLURM_SPEC_PATH}"

      - name: Login to ghcr registry with docker and build Slurm
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_S" | docker login ghcr.io -u "$GHCR_U" --password-stdin
          docker run \
                     --env SLURM_RELTAG="${RELTAG}" \
                     --env SLURM_VERSION="${SLURM_VERSION}" \
                     --env SLURM_SPEC_PATH="${SLURM_SPEC_PATH}" \
                     --env SLURM_PMIX_PATHS="${SLURM_PMIX_PATHS}" \
                     --env SLURM_NVML_PATH="${SLURM_NVML_PATH}" \
                     --env SLURM_UCX_PATH="${SLURM_UCX_PATH}" \
                     --env SLURM_WITH_UCX="${SLURM_WITH_UCX}" \
                     --env SLURM_WITH_RPATH="${SLURM_WITH_RPATH}" \
                      --env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
                      -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
                      -w "${GITHUB_WORKSPACE}" \
                      "${SLURMIMAGE_URL}" \
                      /bin/bash "${BUILD_SCRIPT_DIR}/build_slurm.sh" 2>&1 | tee "slurm_build_${DISTRO}.log"

      - name: Upload Slurm build log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-slurm_build.log
          if-no-files-found: error
          path: ${{ github.workspace }}/slurm_build_${{ matrix.distro }}.log

      - name: Upload Slurm rpm list as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-image_slurm_rpms.txt
          if-no-files-found: error
          path: ${{ github.workspace }}/image_slurm_rpms.txt

      - name: Upload Slurm rpms as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-slurm_rpms
          if-no-files-found: error
          path: ${{ github.workspace }}/rpms/slurm-*.rpm

  publish_files:
    name: Publish built files in release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prolog
      - build_pmix
      - build_munge
      - build_slurm
    env:
      RELTAG: ${{ needs.prolog.outputs.reltag }}

    steps:
      - name: Download PMIx rpms
        uses: actions/download-artifact@v8
        with:
          pattern: "*-pmix-*-rpms"
          path: rpms/pmix
          merge-multiple: true

      - name: Download Munge rpms
        uses: actions/download-artifact@v8
        with:
          pattern: "*-munge-*-rpms"
          path: rpms/munge
          merge-multiple: true

      - name: Download Slurm rpms
        uses: actions/download-artifact@v8
        with:
          pattern: "*-slurm_rpms"
          path: rpms/slurm
          merge-multiple: true

      - name: Download PMIx build logs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-pmix-*-build.log"
          path: logs
          merge-multiple: true

      - name: Download Munge build logs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-munge-*-build.log"
          path: logs
          merge-multiple: true

      - name: Download Slurm build logs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-slurm_build.log"
          path: logs
          merge-multiple: true

      - name: Create distro tarballs from rpms
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t distros < <(
            find rpms -type f -name '*.rpm' -exec basename '{}' ';' \
              | awk -F. '{for (i = 1; i <= NF; i++) if ($i ~ /^el[0-9]+$/) print $i}' \
              | sort -u
          )

          if [ "${#distros[@]}" -eq 0 ]; then
            echo "No distro-specific RPM suffixes matching *.el[0-9]+.*.rpm were found under rpms/" >&2
            exit 1
          fi

          staging_root="$(mktemp -d)"
          trap 'rm -rf "${staging_root}"' EXIT

          for distro in "${distros[@]}"; do
            distro_stage="${staging_root}/${distro}"
            mkdir -p "${distro_stage}/rpms"

            while IFS= read -r -d '' rpm; do
              rpm_dir="$(dirname "${rpm}")"
              mkdir -p "${distro_stage}/${rpm_dir}"
              cp "${rpm}" "${distro_stage}/${rpm_dir}/"
            done < <(find rpms -type f -name "*.${distro}.*.rpm" -print0)

            tar -czf "rpm_tarball_${distro}_${RELTAG}.tar.gz" -C "${distro_stage}" rpms
          done

      - name: Create tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release and add assets
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prolog.outputs.release_body }}
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: "slurm + pmix builds (${{ env.RELTAG }})"
          fail_on_unmatched_files: true
          files: |
            logs/*
            rpm_tarball_*.tar.gz
