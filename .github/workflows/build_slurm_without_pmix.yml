name: Build Slurm packages without PMIx
run-name: ${{ github.actor }} is building Rocky8 Slurm without PMIx 🚀

on: workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DISTRO: el8-no-pmix
  SLURM_VERSION: 25.05.6
  SLURM_SPEC_PATH: ./slurm-25.05.6/slurm.spec
  SLURMIMAGE_URL: ghcr.io/jose-d/images/rocky8_slurm-build:latest
  SLURM_NVML_PATH: /usr/local/cuda/targets/x86_64-linux/
  SLURM_WITH_RPATH: "true"

jobs:
  prolog:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      reltag: ${{ steps.generate.outputs.reltag }}
      release_body: ${{ steps.generate.outputs.release_body }}

    steps:
      - name: Generate release metadata
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          RELTAG="$(date +%Y%m%d%H%M%S)"
          {
            echo "reltag=${RELTAG}"
            echo "release_body<<EOF"
            echo "RPMs containing builds of:"
            echo "* Rocky8/EL8 compatible [Slurm ${SLURM_VERSION}](https://slurm.schedmd.com/) without PMIx, with NVML/CUDA support"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build_slurm:
    name: Build Rocky8 Slurm without PMIx
    runs-on: ubuntu-latest
    needs: prolog
    permissions:
      contents: read
      packages: read
    env:
      GHCR_U: ${{ vars.GHCR_U || github.repository_owner }}
      GHCR_S: ${{ secrets.GHCR_S || secrets.GITHUB_TOKEN }}
      RELTAG: ${{ needs.prolog.outputs.reltag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Slurm tarball
        uses: actions/cache@v5
        with:
          path: slurm-${{ env.SLURM_VERSION }}.tar.bz2
          key: ${{ runner.os }}-${{ env.DISTRO }}-slurm-${{ env.SLURM_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DISTRO }}-slurm-

      - name: Download Slurm tarball, unpack, patch spec file
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "slurm-${SLURM_VERSION}.tar.bz2" ]; then
            curl -L -o "slurm-${SLURM_VERSION}.tar.bz2" "https://download.schedmd.com/slurm/slurm-${SLURM_VERSION}.tar.bz2"
          fi
          tar -xf "slurm-${SLURM_VERSION}.tar.bz2"
          sed -i "s/^%define rel.*$/%define rel     ${RELTAG}/g" "${SLURM_SPEC_PATH}"
          sed -i "s/^%global slurm_source_dir.*$/%global slurm_source_dir %{name}-%{version}/g" "${SLURM_SPEC_PATH}"

      - name: Login to ghcr registry with docker and build Slurm
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_S" | docker login ghcr.io -u "$GHCR_U" --password-stdin
          docker run \
                     --env SLURM_RELTAG="${RELTAG}" \
                     --env SLURM_VERSION="${SLURM_VERSION}" \
                     --env SLURM_SPEC_PATH="${SLURM_SPEC_PATH}" \
                     --env SLURM_WITH_PMIX="false" \
                     --env SLURM_NVML_PATH="${SLURM_NVML_PATH}" \
                     --env SLURM_WITH_RPATH="${SLURM_WITH_RPATH}" \
                     --env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
                     -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
                     -w "${GITHUB_WORKSPACE}" \
                     "${SLURMIMAGE_URL}" \
                     /bin/bash scripts/build_slurm.sh 2>&1 | tee "slurm_build_${DISTRO}.log"

      - name: Upload Slurm build log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DISTRO }}-slurm_build.log
          if-no-files-found: error
          path: ${{ github.workspace }}/slurm_build_${{ env.DISTRO }}.log

      - name: Upload Slurm rpm list as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DISTRO }}-image_slurm_rpms.txt
          if-no-files-found: error
          path: ${{ github.workspace }}/image_slurm_rpms.txt

      - name: Upload Slurm rpms as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DISTRO }}-slurm_rpms
          if-no-files-found: error
          path: ${{ github.workspace }}/rpms/slurm-*.rpm

  publish_files:
    name: Publish built files in release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prolog
      - build_slurm
    env:
      RELTAG: ${{ needs.prolog.outputs.reltag }}

    steps:
      - name: Download Slurm rpms
        uses: actions/download-artifact@v8
        with:
          pattern: "*-slurm_rpms"
          path: rpms/slurm
          merge-multiple: true

      - name: Download Slurm build logs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-slurm_build.log"
          path: logs
          merge-multiple: true

      - name: Create tarball from all rpms
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "rpm_tarball_${RELTAG}.tar.gz" rpms/

      - name: Create tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release and add assets
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prolog.outputs.release_body }}
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: "slurm builds without pmix (${{ env.RELTAG }})"
          fail_on_unmatched_files: true
          files: |
            logs/*
            rpm_tarball_*.tar.gz
